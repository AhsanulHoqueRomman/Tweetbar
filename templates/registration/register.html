{% extends "layout.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-75">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg rounded-5 overflow-hidden auth-card">
                <div class="p-5 pb-4 text-center">
                    <div class="auth-icon mb-3">
                        🚀
                    </div>
                    <h2 class="fw-bold mb-2 text-white">
                        Create Account
                    </h2>
                    <p class="text-secondary mb-0">
                        Join the community and start posting tweets.
                    </p>
                </div>
                <!-- Form -->
                <div class="card-body px-5 pb-5">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            {{ form.as_p }}
                        </div>
                        <button type="submit"
                                class="btn btn-light text-dark fw-semibold w-100 py-3 rounded-pill shadow-sm auth-btn">
                            Register
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-secondary mb-0">
                            Already have an account?
                        </p>
                        <a href="{% url 'login' %}"
                           class="text-decoration-none fw-semibold text-info">
                            Login Here
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!--Style Part-->

<style>
    
.min-vh-75{
    min-height: 75vh;
}

.auth-card{
    background: #111827;
    backdrop-filter: blur(10px);
    transition: 0.3s ease;
}

.auth-card:hover{
    transform: translateY(-4px);
}

.auth-icon{
    width: 80px;
    height: 80px;
    margin: auto;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;

    background: rgba(255,255,255,0.08);

    font-size: 32px;
}

.auth-btn{
    transition: 0.3s ease;
}

.auth-btn:hover{
    transform: translateY(-2px);
}

/* Django Form Styling */

.auth-card input{
    width: 100%;
    padding: 14px 18px;

    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 16px;

    color: white;

    outline: none;

    transition: 0.3s ease;
}

.auth-card input:focus{
    border-color: #6ea8fe;
    box-shadow: 0 0 0 4px rgba(110,168,254,0.15);
}

.auth-card label{
    margin-bottom: 8px;
    font-weight: 500;
    color: #d1d5db;
}

.auth-card p{
    margin-bottom: 20px;
}

.helptext{
    display: block;
    margin-top: 6px;
    color: #9ca3af;
    font-size: 14px;
}

ul{
    padding-left: 18px;
    color: #9ca3af;
    font-size: 14px;
}

</style>

{% endblock %}
