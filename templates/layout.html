{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Tweeter
        {% endblock %}
    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background: #0f172a;
            font-family: 'Inter', sans-serif;
            color: white;
        }


        .navbar{
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);

            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .navbar-brand{
            font-size: 24px;
            color: white !important;
            letter-spacing: -0.5px;
        }

        .nav-link{
            color: #cbd5e1 !important;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .nav-link:hover{
            color: white !important;
        }


        .search-input{
            width: 240px;

            background: #1e293b;
            border: 1px solid #334155;

            color: white;

            border-radius: 999px;

            padding: 10px 18px;

            transition: 0.3s ease;
        }

        .search-input::placeholder{
            color: #94a3b8;
        }

        .search-input:focus{
            outline: none;
            border-color: #60a5fa;

            box-shadow: 0 0 0 4px rgba(96,165,250,0.15);
        }

        .search-btn{
            background: #2563eb;
            border: none;

            color: white;

            border-radius: 999px;

            padding: 10px 22px;

            font-weight: 500;

            transition: 0.3s ease;
        }

        .search-btn:hover{
            background: #1d4ed8;
            transform: translateY(-2px);
        }


        .btn-custom{
            border-radius: 999px;
            padding: 10px 22px;

            font-weight: 500;

            transition: 0.3s ease;
        }

        .btn-custom:hover{
            transform: translateY(-2px);
        }

        .btn-tweet{
            background: white;
            color: black;
            border: none;
        }

        .btn-tweet:hover{
            background: #e2e8f0;
        }

        .btn-login{
            border: 1px solid #334155;
            color: #e2e8f0;
            background: transparent;
        }

        .btn-login:hover{
            background: #1e293b;
            color: white;
        }

        .btn-register{
            background: #2563eb;
            color: white;
            border: none;
        }

        .btn-register:hover{
            background: #1d4ed8;
        }

        .btn-logout{
            background: #dc2626;
            color: white;
            border: none;
        }

        .btn-logout:hover{
            background: #b91c1c;
        }


        .card{
            background: #111827;
            border: 1px solid rgba(255,255,255,0.04);

            transition: 0.3s ease;
        }

        .card:hover{
            transform: translateY(-5px);

            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }



        .form-control{
            background: #1e293b;
            border: 1px solid #334155;

            color: white;

            border-radius: 16px;

            padding: 12px 16px;
        }

        .form-control:focus{
            background: #1e293b;
            color: white;

            border-color: #60a5fa;

            box-shadow: 0 0 0 4px rgba(96,165,250,0.15);
        }



        .btn,
        .card,
        .form-control{
            transition: 0.3s ease;
        }

    </style>

</head>

<body>



    <nav class="navbar navbar-expand-lg sticky-top py-3">

        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand fw-bold"
               href="{% url 'tweet_list' %}">

                🐦 Tweetbar

            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler border-0 shadow-none"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">

                <span class="navbar-toggler-icon"></span>

            </button>

            <!-- Navbar Content -->
            <div class="collapse navbar-collapse"
                 id="navbarSupportedContent">

                <!-- Left Nav -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">

                    <li class="nav-item">

                        <a class="nav-link active"
                           href="{% url 'tweet_list' %}">

                            Home

                        </a>

                    </li>

                </ul>

                <!-- Search -->
                <form class="d-flex me-3"
                      method="GET"
                      action="{% url 'search_tweet' %}">

                    <input class="search-input me-2"
                           type="search"
                           name="q"
                           placeholder="Search tweets...">

                    <button class="search-btn"
                            type="submit">

                        Search

                    </button>

                </form>

                <!-- Create Tweet -->
                {% if user.is_authenticated %}

                <a href="{% url 'tweet_create' %}"
                   class="btn btn-custom btn-tweet me-2">

                    + Tweet

                </a>

                <!-- Logout -->
                <form action="{% url 'logout' %}"
                      method="post">

                    {% csrf_token %}

                    <button class="btn btn-custom btn-logout"
                            type="submit">

                        Logout

                    </button>

                </form>

                {% else %}

                <!-- Login -->
                <a href="{% url 'login' %}"
                   class="btn btn-custom btn-login me-2">

                    Login

                </a>

                <!-- Register -->
                <a href="{% url 'register' %}"
                   class="btn btn-custom btn-register">

                    Register

                </a>

                {% endif %}

            </div>

        </div>

    </nav>


    <main class="container py-4">

        {% block content %}

        {% endblock %}

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
