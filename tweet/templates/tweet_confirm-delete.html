{% extends "layout.html" %}

{% block title %}
Delete Tweet
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card border-0 shadow-lg rounded-4 text-center overflow-hidden">

                <!-- Top Section -->
                <div class="bg-danger text-white p-4">

                    <h2 class="fw-bold mb-2">
                        Delete Tweet ⚠️
                    </h2>

                    <p class="mb-0 opacity-75">
                        This action cannot be undone.
                    </p>

                </div>

                <!-- Content -->
                <div class="card-body p-5">

                    <div class="display-1 mb-3">
                        🗑️
                    </div>

                    <h4 class="fw-semibold mb-3">
                        Are you sure?
                    </h4>

                    <p class="text-muted mb-4">
                        You are about to permanently delete this tweet.
                    </p>

                    <form method="post">

                        {% csrf_token %}

                        <div class="d-flex justify-content-center gap-3">

                            <button type="submit"
                                    class="btn btn-danger px-4 py-2 rounded-pill shadow-sm"
                                    style="transition: 0.3s;">
                                Delete
                            </button>

                            <a href="{% url 'tweet_list' %}"
                               class="btn btn-outline-secondary px-4 py-2 rounded-pill"
                               style="transition: 0.3s;">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
